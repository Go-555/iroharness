server {
  listen 443 ssl http2;
  server_name iroharness.example.com;

  ssl_certificate /etc/letsencrypt/live/iroharness.example.com/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/iroharness.example.com/privkey.pem;

  location ~ ^/(audience|openapi\.json) {
    # Replace this with your auth_request, SSO, VPN-only allowlist, or
    # equivalent policy before exposing admin/audience routes publicly.
    return 403;
  }

  location / {
    proxy_pass http://127.0.0.1:4178;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Forwarded-Host $host;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";
    proxy_buffering off;
  }
}
