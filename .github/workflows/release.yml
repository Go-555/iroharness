name: Release

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Run checks and npm publish --dry-run instead of publishing"
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    name: Publish npm package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install
        run: npm install

      - name: Verify Node package
        run: npm run verify

      - name: Verify Rust realtime core
        run: |
          cargo test -p iroharness-realtime-core
          cargo build -p iroharness-realtime-core --lib
          cargo build -p iroharness-realtime-core --lib --target wasm32-unknown-unknown
          cargo build -p iroharness-realtime-core --bin iroharness-realtime-core-jsonl

      - name: Package dry run
        run: npm run package:dry-run

      - name: Generated app smoke test
        run: npm run smoke:generated-app

      - name: OSS readiness check
        run: IROHARNESS_REQUIRE_GIT_REMOTE=1 npm run oss:ready

      - name: Publish dry run
        if: github.event_name == 'workflow_dispatch' && inputs.dry_run == 'true'
        run: npm publish --dry-run --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish
        if: github.event_name == 'release' || (github.event_name == 'workflow_dispatch' && inputs.dry_run == 'false')
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
