name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  node:
    name: Node checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install
        run: npm install

      - name: Verify
        run: npm run verify

      - name: Package dry run
        run: npm run package:dry-run

  rust:
    name: Rust realtime core
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Test realtime core
        run: cargo test -p iroharness-realtime-core

      - name: Build JSONL realtime core binary
        run: cargo build -p iroharness-realtime-core --bin iroharness-realtime-core-jsonl
